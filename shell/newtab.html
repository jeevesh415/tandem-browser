<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuwe Tab — Tandem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Dark theme (default) */
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
      --input-bg: #0f3460;
      --success: #4ecca3;
    }

    /* Light theme */
    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --accent: #e94560;
      --text: #1e293b;
      --text-dim: #64748b;
      --input-bg: #f1f5f9;
      --success: #059669;
    }

    /* System preference detection */
    @media (prefers-color-scheme: light) {
      [data-theme="system"] {
        --bg: #f8fafc;
        --surface: #ffffff;
        --accent: #e94560;
        --text: #1e293b;
        --text-dim: #64748b;
        --input-bg: #f1f5f9;
        --success: #059669;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12vh;
    }

    /* ═══ Logo ═══ */
    .logo {
      text-align: center;
      margin-bottom: 32px;
      user-select: none;
    }
    .logo h1 {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .logo h1 span.cheese { font-size: 38px; }
    .logo .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ═══ Search bar ═══ */
    .search-wrap {
      width: 100%;
      max-width: 580px;
      margin-bottom: 40px;
    }
    .search-bar {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 14px 24px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
    }
    .search-bar::placeholder { color: var(--text-dim); }

    /* ═══ Quick links ═══ */
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 600px;
      margin-bottom: 40px;
    }
    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 80px;
      text-decoration: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s, transform 0.15s;
      user-select: none;
    }
    .quick-link:hover { color: var(--text); transform: translateY(-2px); }
    .quick-link .ql-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: background 0.15s, border-color 0.15s;
      overflow: hidden;
    }
    .quick-link:hover .ql-icon { background: var(--input-bg); border-color: rgba(255,255,255,0.15); }
    .quick-link .ql-icon img {
      width: 28px;
      height: 28px;
      border-radius: 4px;
    }
    .quick-link .ql-label {
      font-size: 11px;
      text-align: center;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    /* ═══ Recent tabs ═══ */
    .recent-section {
      width: 100%;
      max-width: 580px;
      margin-bottom: 40px;
    }
    .recent-section h3 {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: var(--text);
    }
    .recent-item:hover { background: rgba(255,255,255,0.05); }
    .recent-item .ri-favicon {
      width: 16px; height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .recent-item .ri-title {
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-item .ri-url {
      font-size: 11px;
      color: var(--text-dim);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ═══ Kees chat widget ═══ */
    .kees-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
    }
    .kees-toggle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(233,69,96,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kees-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(233,69,96,0.5); }
    .kees-chat-box {
      display: none;
      position: absolute;
      bottom: 62px;
      right: 0;
      width: 320px;
      max-height: 400px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      flex-direction: column;
      overflow: hidden;
    }
    .kees-chat-box.open { display: flex; }
    .kees-chat-header {
      padding: 12px 14px;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      font-weight: 600;
    }
    .kees-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 200px;
      max-height: 280px;
    }
    .kees-chat-messages::-webkit-scrollbar { width: 4px; }
    .kees-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .kcm {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.4;
      max-width: 85%;
      word-break: break-word;
    }
    .kcm.robin { background: rgba(78,204,163,0.2); border: 1px solid rgba(78,204,163,0.3); align-self: flex-end; }
    .kcm.kees { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.2); align-self: flex-start; }
    .kees-chat-input-wrap {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .kees-chat-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .kees-chat-input:focus { border-color: var(--accent); }
    .kees-chat-send {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo">
    <h1>Tandem <span class="cheese">🧀</span></h1>
    <div class="subtitle">Robin & Kees browsen samen</div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-bar" id="search-bar" type="text" placeholder="Zoek op DuckDuckGo of voer een URL in..." autofocus>
  </div>

  <!-- Quick links -->
  <div class="quick-links" id="quick-links">
    <!-- Populated by JS -->
  </div>

  <!-- Recent tabs -->
  <div class="recent-section" id="recent-section" style="display:none;">
    <h3>Recente tabs</h3>
    <div class="recent-list" id="recent-list"></div>
  </div>

  <!-- Kees chat widget -->
  <div class="kees-widget">
    <div class="kees-chat-box" id="kees-chat-box">
      <div class="kees-chat-header">🧀 Kees</div>
      <div class="kees-chat-messages" id="kees-chat-messages"></div>
      <div class="kees-chat-input-wrap">
        <input class="kees-chat-input" id="kees-chat-input" type="text" placeholder="Bericht aan Kees...">
        <button class="kees-chat-send" id="kees-chat-send">→</button>
      </div>
    </div>
    <button class="kees-toggle" id="kees-toggle" title="Chat met Kees">🧀</button>
  </div>

  <script>
    // ═══ Quick links config ═══
    const defaultLinks = [
      { label: 'LinkedIn', url: 'https://www.linkedin.com', icon: '💼', favicon: 'https://www.google.com/s2/favicons?domain=linkedin.com&sz=64' },
      { label: 'GitHub', url: 'https://github.com', icon: '🐙', favicon: 'https://www.google.com/s2/favicons?domain=github.com&sz=64' },
      { label: 'Kanbu', url: 'https://app.kanbu.be', icon: '📋', favicon: 'https://www.google.com/s2/favicons?domain=kanbu.be&sz=64' },
      { label: 'ClaroNote', url: 'https://claronote.com', icon: '📝', favicon: 'https://www.google.com/s2/favicons?domain=claronote.com&sz=64' },
      { label: 'DuckDuckGo', url: 'https://duckduckgo.com', icon: '🦆', favicon: 'https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=64' },
      { label: 'Gmail', url: 'https://mail.google.com', icon: '📧', favicon: 'https://www.google.com/s2/favicons?domain=gmail.com&sz=64' },
      { label: 'YouTube', url: 'https://youtube.com', icon: '▶️', favicon: 'https://www.google.com/s2/favicons?domain=youtube.com&sz=64' },
      { label: 'Reddit', url: 'https://reddit.com', icon: '🤖', favicon: 'https://www.google.com/s2/favicons?domain=reddit.com&sz=64' },
    ];

    const quickLinksEl = document.getElementById('quick-links');
    for (const link of defaultLinks) {
      const a = document.createElement('a');
      a.className = 'quick-link';
      a.dataset.url = link.url;
      a.innerHTML = `
        <div class="ql-icon"><img src="${link.favicon}" onerror="this.style.display='none';this.parentElement.textContent='${link.icon}'"></div>
        <div class="ql-label">${link.label}</div>
      `;
      a.addEventListener('click', () => {
        // Navigate via postMessage to parent shell
        window.parent.postMessage({ type: 'tandem-newtab-navigate', url: link.url }, '*');
      });
      quickLinksEl.appendChild(a);
    }

    // ═══ Search bar ═══
    const searchBar = document.getElementById('search-bar');
    searchBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        let q = searchBar.value.trim();
        if (!q) return;
        let url;
        if (q.startsWith('http://') || q.startsWith('https://')) {
          url = q;
        } else if (q.includes('.') && !q.includes(' ')) {
          url = 'https://' + q;
        } else {
          url = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
        }
        window.parent.postMessage({ type: 'tandem-newtab-navigate', url }, '*');
      }
    });

    // ═══ Recent tabs — fetch from API ═══
    async function loadRecentTabs() {
      try {
        const resp = await fetch('http://localhost:8765/tabs/list');
        if (!resp.ok) return;
        const data = await resp.json();
        if (!data.tabs || data.tabs.length === 0) return;
        const recentSection = document.getElementById('recent-section');
        const recentList = document.getElementById('recent-list');
        const seen = new Set();
        for (const tab of data.tabs) {
          if (!tab.url || tab.url === 'about:blank' || seen.has(tab.url)) continue;
          seen.add(tab.url);
          const item = document.createElement('a');
          item.className = 'recent-item';
          let hostname = '';
          try { hostname = new URL(tab.url).hostname; } catch {}
          item.innerHTML = `
            <img class="ri-favicon" src="${tab.favicon || `https://www.google.com/s2/favicons?domain=${hostname}&sz=32`}" onerror="this.style.display='none'">
            <span class="ri-title">${tab.title || hostname}</span>
            <span class="ri-url">${hostname}</span>
          `;
          item.addEventListener('click', () => {
            window.parent.postMessage({ type: 'tandem-newtab-navigate', url: tab.url }, '*');
          });
          recentList.appendChild(item);
        }
        if (recentList.children.length > 0) recentSection.style.display = '';
      } catch {}
    }
    setTimeout(loadRecentTabs, 500);

    // ═══ Kees chat widget ═══
    const keesToggle = document.getElementById('kees-toggle');
    const keesChatBox = document.getElementById('kees-chat-box');
    const keesChatInput = document.getElementById('kees-chat-input');
    const keesChatSend = document.getElementById('kees-chat-send');
    const keesChatMessages = document.getElementById('kees-chat-messages');
    let chatOpen = false;

    keesToggle.addEventListener('click', () => {
      chatOpen = !chatOpen;
      keesChatBox.classList.toggle('open', chatOpen);
      if (chatOpen) {
        keesChatInput.focus();
        loadChatHistory();
      }
    });

    const renderedIds = new Set();
    function addChatMsg(msg) {
      if (renderedIds.has(msg.id)) return;
      renderedIds.add(msg.id);
      const div = document.createElement('div');
      div.className = `kcm ${msg.from}`;
      div.textContent = msg.text;
      keesChatMessages.appendChild(div);
      keesChatMessages.scrollTop = keesChatMessages.scrollHeight;
    }

    async function loadChatHistory() {
      try {
        const resp = await fetch('http://localhost:8765/chat?limit=20');
        if (!resp.ok) return;
        const data = await resp.json();
        if (data.messages) data.messages.forEach(addChatMsg);
      } catch {}
    }

    async function sendKeesMsg() {
      const text = keesChatInput.value.trim();
      if (!text) return;
      keesChatInput.value = '';
      // Show immediately
      addChatMsg({ id: Date.now(), from: 'robin', text });
      try {
        // Send via the shell's IPC (robin message)
        await fetch('http://localhost:8765/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, from: 'robin' }),
        });
      } catch {}
    }
    keesChatSend.addEventListener('click', sendKeesMsg);
    keesChatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendKeesMsg(); }
    });

    // Poll for new messages
    let lastMsgId = 0;
    setInterval(async () => {
      if (!chatOpen) return;
      try {
        const resp = await fetch(`http://localhost:8765/chat?since_id=${lastMsgId}`);
        if (!resp.ok) return;
        const data = await resp.json();
        if (data.messages) {
          for (const msg of data.messages) {
            addChatMsg(msg);
            if (msg.id > lastMsgId) lastMsgId = msg.id;
          }
        }
      } catch {}
    }, 2000);

    // Load theme from config
    async function loadThemeFromConfig() {
      try {
        const response = await fetch('http://localhost:8765/config');
        if (response.ok) {
          const config = await response.json();
          const theme = (config.appearance && config.appearance.theme) || 'dark';
          applyTheme(theme);
        }
      } catch (error) {
        console.log('Failed to load theme config, using default dark theme');
      }
    }

    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else if (theme === 'system') {
        document.documentElement.setAttribute('data-theme', 'system');
      } else {
        document.documentElement.removeAttribute('data-theme'); // Default dark
      }
    }

    // Load theme on startup
    setTimeout(loadThemeFromConfig, 100);
  </script>
</body>
</html>
